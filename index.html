<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadith</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Prevents the main page from scrolling */
    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden; 
    }

    /* Ensures the iframe fills the space and hides its own scrollbars */
    iframe {
        width: 100vw;
        height: 100vh;
        border: none;
        display: block; /* Removes tiny bottom gap common with inline elements */
    }
    </style>
</head>
<body>
    <iframe src="https://sunnah.com/"></iframe>
</body>
</html>
